on:
  pull_request:
    branches:
      - dev
      - qa
      - main
    types:
      - closed
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  resolve-context:
    runs-on: ubuntu-latest

    outputs:
      target_environment: ${{ steps.context.outputs.target_environment }}
      bundle_target: ${{ steps.context.outputs.bundle_target }}
      workspace_target: ${{ steps.context.outputs.workspace_target }}
      previous_environment: ${{ steps.context.outputs.previous_environment }}
      previous_evidence_branch: ${{ steps.context.outputs.previous_evidence_branch }}
      github_environment: ${{ steps.context.outputs.github_environment }}
      source_branch: ${{ steps.context.outputs.source_branch }}
      target_branch: ${{ steps.context.outputs.target_branch }}
      commit_sha: ${{ steps.context.outputs.commit_sha }}

    steps:
      - name: Resolve PR deployment context
        id: context
        run: |
          SOURCE_BRANCH="${{ github.head_ref }}"
          TARGET_BRANCH="${{ github.base_ref }}"
          COMMIT_SHA="${{ github.event.pull_request.head.sha }}"

          echo "source_branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "target_branch=$TARGET_BRANCH" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"

          if [ "$TARGET_BRANCH" = "dev" ]; then
            echo "target_environment=dev" >> "$GITHUB_OUTPUT"
            echo "bundle_target=dev" >> "$GITHUB_OUTPUT"
            echo "workspace_target=dev" >> "$GITHUB_OUTPUT"
            echo "github_environment=dev" >> "$GITHUB_OUTPUT"
            echo "previous_environment=" >> "$GITHUB_OUTPUT"
            echo "previous_evidence_branch=" >> "$GITHUB_OUTPUT"
          elif [ "$TARGET_BRANCH" = "qa" ]; then
            echo "target_environment=uat" >> "$GITHUB_OUTPUT"
            echo "bundle_target=uat" >> "$GITHUB_OUTPUT"
            echo "workspace_target=uat" >> "$GITHUB_OUTPUT"
            echo "github_environment=uat" >> "$GITHUB_OUTPUT"
            echo "previous_environment=dev" >> "$GITHUB_OUTPUT"
            echo "previous_evidence_branch=dev" >> "$GITHUB_OUTPUT"
          elif [ "$TARGET_BRANCH" = "main" ]; then
            echo "target_environment=prod" >> "$GITHUB_OUTPUT"
            echo "bundle_target=prod" >> "$GITHUB_OUTPUT"
            echo "workspace_target=prod" >> "$GITHUB_OUTPUT"
            echo "github_environment=prod" >> "$GITHUB_OUTPUT"
            echo "previous_environment=uat" >> "$GITHUB_OUTPUT"
            echo "previous_evidence_branch=qa" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported target branch: $TARGET_BRANCH"
            exit 1
          fi

  deploy-bundle:
    needs: resolve-context
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve-context.outputs.github_environment }}

    env:
      TARGET_ENVIRONMENT: ${{ needs.resolve-context.outputs.target_environment }}
      BUNDLE_TARGET: ${{ needs.resolve-context.outputs.bundle_target }}
      WORKSPACE_TARGET: ${{ needs.resolve-context.outputs.workspace_target }}
      PREVIOUS_ENVIRONMENT: ${{ needs.resolve-context.outputs.previous_environment }}
      PREVIOUS_EVIDENCE_BRANCH: ${{ needs.resolve-context.outputs.previous_evidence_branch }}
      SOURCE_BRANCH: ${{ needs.resolve-context.outputs.source_branch }}
      TARGET_BRANCH: ${{ needs.resolve-context.outputs.target_branch }}
      COMMIT_SHA: ${{ needs.resolve-context.outputs.commit_sha }}
      ARTIFACT_RETENTION_DAYS: 7

    steps:
      - name: Checkout PR source commit
        uses: actions/checkout@v4
        with:
          ref: ${{ env.COMMIT_SHA }}

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Download previous deployment evidence
        if: env.PREVIOUS_ENVIRONMENT != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p evidence/deployments

          PREVIOUS_RUN_ID="$(gh run list \
            --workflow "$GITHUB_WORKFLOW" \
            --branch "$PREVIOUS_EVIDENCE_BRANCH" \
            --commit "$COMMIT_SHA" \
            --status success \
            --json databaseId \
            --jq '.[0].databaseId')"

          if [ -z "$PREVIOUS_RUN_ID" ]; then
            echo "No successful ${PREVIOUS_ENVIRONMENT} deployment evidence found for commit ${COMMIT_SHA}"
            exit 1
          fi

          gh run download "$PREVIOUS_RUN_ID" \
            --name "${PREVIOUS_ENVIRONMENT}-deployment-evidence" \
            --dir evidence/deployments

      - name: Validate promotion eligibility
        if: env.PREVIOUS_ENVIRONMENT != ''
        run: |
          python scripts/promotion_validator.py \
            --target-environment "$TARGET_ENVIRONMENT" \
            --current-commit-sha "$COMMIT_SHA" \
            --previous-manifest-path "evidence/deployments/${PREVIOUS_ENVIRONMENT}-deployment-manifest.json" \
            --output-path "evidence/deployments/${TARGET_ENVIRONMENT}-promotion-validation-result.json"

      - name: Validate Databricks bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: |
          databricks bundle validate --target "$BUNDLE_TARGET"

      - name: Deploy Databricks bundle
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
          DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
          DATABRICKS_AUTH_TYPE: oauth-m2m
        run: |
          databricks bundle deploy --target "$BUNDLE_TARGET"

      - name: Generate deployment evidence
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
        run: |
          mkdir -p evidence/deployments

          DEPLOY_STARTED_AT="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"

          python scripts/deployment_manifest.py \
            --environment "$TARGET_ENVIRONMENT" \
            --bundle-name "databricks-cicd-bundle-poc" \
            --bundle-target "$BUNDLE_TARGET" \
            --workspace-target "$WORKSPACE_TARGET" \
            --workspace-root-path "/Workspace/Users/${DATABRICKS_CLIENT_ID}/.bundle/databricks-cicd-bundle-poc/${BUNDLE_TARGET}" \
            --authenticated-principal "$DATABRICKS_CLIENT_ID" \
            --started-at "$DEPLOY_STARTED_AT" \
            --source-branch "$SOURCE_BRANCH" \
            --target-branch "$TARGET_BRANCH" \
            --commit-sha "$COMMIT_SHA" \
            --github-workflow "$GITHUB_WORKFLOW" \
            --github-run-id "$GITHUB_RUN_ID" \
            --github-run-number "$GITHUB_RUN_NUMBER" \
            --github-job "$GITHUB_JOB" \
            --github-event-name "$GITHUB_EVENT_NAME" \
            --databricks-host "$DATABRICKS_HOST" \
            --output-path "evidence/deployments/${TARGET_ENVIRONMENT}-deployment-manifest.json"

      - name: Upload deployment evidence
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.TARGET_ENVIRONMENT }}-deployment-evidence
          path: evidence/deployments/
          retention-days: 7