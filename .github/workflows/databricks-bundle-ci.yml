name: Databricks Bundle CI

on:
  pull_request:
    branches:
      - dev
      - qa
      - main

  push:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  resolve-context:
    name: Resolve Context
    runs-on: ubuntu-latest

    outputs:
      bundle_target: ${{ steps.context.outputs.bundle_target }}
      github_environment: ${{ steps.context.outputs.github_environment }}
      should_build_release: ${{ steps.context.outputs.should_build_release }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make CI helper scripts executable
        run: |
          chmod +x scripts/*.sh

      - name: Resolve branch context
        id: context
        run: |
          scripts/ci_resolve_context.sh \
            "${GITHUB_EVENT_NAME}" \
            "${{ github.base_ref }}" \
            "${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    needs: resolve-context

    environment: ${{ needs.resolve-context.outputs.github_environment }}

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_BUNDLE_ENV: ${{ needs.resolve-context.outputs.bundle_target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip pytest

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Python syntax validation
        run: |
          python -m compileall scripts Tests

      - name: Run pytest for CI Workflow Context
        run: |
          python -m pytest Tests/test_ci_resolve_context.py -v

      - name: Run pytest for CI Workflow Gating
        run: |
          python -m pytest Tests/test_ci_workflow_gating.py -v

      - name: Run pytest for Deployment Manifest
        env:
          PYTHONPATH: scripts
          DEPLOYMENT_MANIFEST_SCRIPT: scripts/deployment_manifest.py
        run: |
          python -m pytest Tests/test_deployment_manifest.py -v

      - name: Run pytest for Promotion Validator
        env:
          PYTHONPATH: scripts
          PROMOTION_VALIDATOR_SCRIPT: scripts/promotion_validator.py
        run: |
          python -m pytest Tests/test_promotion_validator.py -v

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks bundle
        run: |
          databricks bundle validate -t "${DATABRICKS_BUNDLE_ENV}"

  build-release:
    name: Build Immutable Release
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate

    if: needs.resolve-context.outputs.should_build_release == 'true'

    outputs:
      release_id: ${{ steps.release_context.outputs.release_id }}
      artifact_name: ${{ steps.release_context.outputs.artifact_name }}
      artifact_hash: ${{ steps.hash.outputs.artifact_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release context
        id: release_context
        run: |
          RELEASE_ID="rc-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}"
          ARTIFACT_NAME="${RELEASE_ID}.zip"

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Prepare release directory
        run: |
          mkdir -p release-package

          cp databricks.yml release-package/

          if [ -d notebooks ]; then
            cp -R notebooks release-package/
          fi

          if [ -d pipeline ]; then
            cp -R pipeline release-package/
          fi

          if [ -d scripts ]; then
            cp -R scripts release-package/
          fi

          if [ -d docs ]; then
            cp -R docs release-package/
          fi

      - name: Generate release_manifest.json without artifact hash
        run: |
          cat > release-package/release_manifest.json <<EOF
          {
            "schema_version": "1.0",
            "release": {
              "release_id": "${RELEASE_ID}",
              "artifact_name": "${ARTIFACT_NAME}"
            },
            "build": {
              "repository": "${GITHUB_REPOSITORY}",
              "source_branch": "${GITHUB_REF_NAME}",
              "commit_sha": "${GITHUB_SHA}",
              "workflow_name": "${GITHUB_WORKFLOW}",
              "workflow_run_id": "${GITHUB_RUN_ID}",
              "workflow_run_number": "${GITHUB_RUN_NUMBER}",
              "actor": "${GITHUB_ACTOR}",
              "created_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          }
          EOF

      - name: Create release artifact zip
        run: |
          cd release-package
          zip -r "../${ARTIFACT_NAME}" .

      - name: Compute artifact SHA256
        id: hash
        run: |
          ARTIFACT_HASH="sha256:$(sha256sum "${ARTIFACT_NAME}" | awk '{print $1}')"

          echo "${ARTIFACT_HASH}" > .release-artifact-hash
          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"

      - name: Generate external release_manifest.json
        run: |
          ARTIFACT_HASH="$(cat .release-artifact-hash)"

          cat > release_manifest.json <<EOF
          {
            "schema_version": "1.0",
            "release": {
              "release_id": "${RELEASE_ID}",
              "artifact_name": "${ARTIFACT_NAME}",
              "artifact_hash": "${ARTIFACT_HASH}"
            },
            "build": {
              "repository": "${GITHUB_REPOSITORY}",
              "source_branch": "${GITHUB_REF_NAME}",
              "commit_sha": "${GITHUB_SHA}",
              "workflow_name": "${GITHUB_WORKFLOW}",
              "workflow_run_id": "${GITHUB_RUN_ID}",
              "workflow_run_number": "${GITHUB_RUN_NUMBER}",
              "actor": "${GITHUB_ACTOR}",
              "created_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          }
          EOF

      - name: Validate release manifest schema
        run: |
          validate_string_field() {
            local field="$1"

            test "$(jq -r "${field} | type" release_manifest.json)" = "string"
            test "$(jq -r "${field}" release_manifest.json)" != ""
          }

          test "$(jq -r '.schema_version' release_manifest.json)" = "1.0"

          required_fields=(
            ".release.release_id"
            ".release.artifact_name"
            ".release.artifact_hash"
            ".build.repository"
            ".build.source_branch"
            ".build.commit_sha"
            ".build.workflow_name"
            ".build.workflow_run_id"
            ".build.workflow_run_number"
            ".build.actor"
            ".build.created_at_utc"
          )

          for field in "${required_fields[@]}"; do
            validate_string_field "$field"
          done

          echo "Release manifest schema validation passed."

      - name: Verify release artifact hash
        run: |
          MANIFEST_HASH="$(jq -r '.release.artifact_hash' release_manifest.json)"
          COMPUTED_HASH="sha256:$(sha256sum "${ARTIFACT_NAME}" | awk '{print $1}')"

          if [ "${MANIFEST_HASH}" != "${COMPUTED_HASH}" ]; then
            echo "Release artifact hash verification failed."
            echo "Manifest hash and computed artifact hash do not match."
            exit 1
          fi

          echo "Release artifact hash verification passed."

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_ID }}
          path: |
            ${{ env.ARTIFACT_NAME }}
            release_manifest.json
          retention-days: 7