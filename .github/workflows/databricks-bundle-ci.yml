name: Databricks Bundle CI

on:
  pull_request:
    branches:
      - dev
      - qa
      - main

  push:
    branches:
      - dev

  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  resolve-context:
    name: Resolve Context
    runs-on: ubuntu-latest

    outputs:
      bundle_target: ${{ steps.context.outputs.bundle_target }}
      github_environment: ${{ steps.context.outputs.github_environment }}
      should_build_release: ${{ steps.context.outputs.should_build_release }}

    steps:
      - name: Resolve branch context
        id: context
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "pull_request" ]; then
            BRANCH="${{ github.base_ref }}"
          else
            BRANCH="${GITHUB_REF_NAME}"
          fi

          echo "Resolved branch: ${BRANCH}"

          if [ "${BRANCH}" = "dev" ]; then
            echo "bundle_target=dev" >> "$GITHUB_OUTPUT"
            echo "github_environment=dev" >> "$GITHUB_OUTPUT"
          elif [ "${BRANCH}" = "qa" ]; then
            echo "bundle_target=uat" >> "$GITHUB_OUTPUT"
            echo "github_environment=uat" >> "$GITHUB_OUTPUT"
          elif [ "${BRANCH}" = "main" ]; then
            echo "bundle_target=prod" >> "$GITHUB_OUTPUT"
            echo "github_environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported branch: ${BRANCH}"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "push" ] && [ "${BRANCH}" = "dev" ]; then
            echo "should_build_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build_release=false" >> "$GITHUB_OUTPUT"
          fi

  validate:
    name: Validate Bundle
    runs-on: ubuntu-latest
    needs: resolve-context

    environment: ${{ needs.resolve-context.outputs.github_environment }}

    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_CLIENT_ID: ${{ secrets.DATABRICKS_CLIENT_ID }}
      DATABRICKS_CLIENT_SECRET: ${{ secrets.DATABRICKS_CLIENT_SECRET }}
      DATABRICKS_BUNDLE_ENV: ${{ needs.resolve-context.outputs.bundle_target }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip

          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

          if [ -f requirements-dev.txt ]; then
            pip install -r requirements-dev.txt
          fi

      - name: Python syntax validation
        run: |
          python -m compileall .

      - name: Run pytest
        env:
          DEPLOYMENT_MANIFEST_SCRIPT: scripts/deployment_manifest.py
          PROMOTION_VALIDATOR_SCRIPT: scripts/promotion_validator.py
        run: |
          pytest -v

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Validate Databricks bundle
        run: |
          databricks bundle validate -t "${DATABRICKS_BUNDLE_ENV}"

  build-release:
    name: Build Immutable Release
    runs-on: ubuntu-latest
    needs:
      - resolve-context
      - validate

    if: needs.resolve-context.outputs.should_build_release == 'true'

    outputs:
      release_id: ${{ steps.release_context.outputs.release_id }}
      artifact_name: ${{ steps.release_context.outputs.artifact_name }}
      artifact_hash: ${{ steps.hash.outputs.artifact_hash }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create release context
        id: release_context
        run: |
          RELEASE_ID="rc-$(date -u +%Y%m%d)-${GITHUB_RUN_ID}"
          ARTIFACT_NAME="${RELEASE_ID}.zip"

          echo "release_id=${RELEASE_ID}" >> "$GITHUB_OUTPUT"
          echo "artifact_name=${ARTIFACT_NAME}" >> "$GITHUB_OUTPUT"

          echo "RELEASE_ID=${RELEASE_ID}" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=${ARTIFACT_NAME}" >> "$GITHUB_ENV"

      - name: Prepare release directory
        run: |
          mkdir -p release-package

          cp databricks.yml release-package/

          if [ -d notebooks ]; then
            cp -R notebooks release-package/
          fi

          if [ -d pipeline ]; then
            cp -R pipeline release-package/
          fi

          if [ -d scripts ]; then
            cp -R scripts release-package/
          fi

          if [ -d docs ]; then
            cp -R docs release-package/
          fi

      - name: Create release artifact zip
        run: |
          cd release-package
          zip -r "../${ARTIFACT_NAME}" .

      - name: Compute artifact SHA256
        id: hash
        run: |
          ARTIFACT_HASH="sha256:$(sha256sum "${ARTIFACT_NAME}" | awk '{print $1}')"

          echo "artifact_hash=${ARTIFACT_HASH}" >> "$GITHUB_OUTPUT"
          echo "ARTIFACT_HASH=${ARTIFACT_HASH}" >> "$GITHUB_ENV"

      - name: Generate release_manifest.json
        run: |
          cat > release_manifest.json <<EOF
          {
            "schema_version": "1.0",
            "release": {
              "release_id": "${RELEASE_ID}",
              "artifact_name": "${ARTIFACT_NAME}",
              "artifact_hash": "${ARTIFACT_HASH}"
            },
            "build": {
              "repository": "${GITHUB_REPOSITORY}",
              "source_branch": "${GITHUB_REF_NAME}",
              "commit_sha": "${GITHUB_SHA}",
              "workflow_name": "${GITHUB_WORKFLOW}",
              "workflow_run_id": "${GITHUB_RUN_ID}",
              "workflow_run_number": "${GITHUB_RUN_NUMBER}",
              "actor": "${GITHUB_ACTOR}",
              "created_at_utc": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
            }
          }
          EOF

      - name: Add release manifest to zip
        run: |
          zip "${ARTIFACT_NAME}" release_manifest.json

      - name: Upload immutable release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ env.RELEASE_ID }}
          path: |
            ${{ env.ARTIFACT_NAME }}
            release_manifest.json
          retention-days: 7